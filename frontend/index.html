<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0a0e1f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="心屿" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="description" content="心屿 · 一座会回应你的岛屿。AI 情绪陪伴叙事，倾诉换得一座为你生长的心象岛屿。" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet" />
    <title>心屿 · 一座会回应你的岛屿</title>
    <script data-mobile-entry-redirect>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const requestedView = params.get("view");
        if (requestedView === "desktop") return;

        const matchesMedia = (query) => {
          try {
            return window.matchMedia?.(query)?.matches ?? false;
          } catch {
            return false;
          }
        };

        const smallViewport = matchesMedia("(max-width: 767px)") || window.innerWidth <= 767;
        const touchCapable = (navigator.maxTouchPoints ?? 0) > 0 || matchesMedia("(pointer: coarse)");
        const tabletPortrait = touchCapable && (matchesMedia("(max-width: 900px)") || window.innerWidth <= 900);
        const shouldOpenMobile = requestedView === "mobile" || smallViewport || tabletPortrait;

        if (shouldOpenMobile) {
          const mobileUrl = new URL("/mobile.html", window.location.origin);
          mobileUrl.search = window.location.search;
          mobileUrl.hash = window.location.hash;
          window.location.replace(mobileUrl);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
